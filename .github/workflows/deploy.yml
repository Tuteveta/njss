name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: owc-next
        run: npm ci

      - name: Build
        working-directory: owc-next
        run: npm run build

      - name: Restart PM2
        run: |
          cd ~/owc-png/owc-next
          pm2 restart owc-next || pm2 start npm --name "owc-next" -- start
          pm2 save
